name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify manifest version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(jq -r '.version' custom_components/tesla_fleet/manifest.json)
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "Tag version ($TAG) does not match manifest version ($MANIFEST_VERSION)"
            exit 1
          fi

      - name: Create release zip
        run: |
          cd custom_components
          zip -r ../tesla_fleet.zip tesla_fleet

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tesla_fleet.zip
          generate_release_notes: true
