name: Sync from HA Core upstream

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      upstream_ref:
        # Sync from the HA-core RELEASE matching your installed HA, NOT dev.
        # dev references core APIs newer HA versions don't have yet (e.g.
        # device_tracker.EntityStateAttribute), which breaks entities. Bump this
        # to the tag matching your HA when you upgrade (e.g. 2026.8.0).
        description: "HA core release tag to sync from (match your installed HA version)"
        required: false
        default: "2026.7.2"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync tesla_fleet from HA core
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Resolve upstream ref
        id: ref
        env:
          # Bind the workflow input to an env var rather than interpolating it
          # into the shell command, to avoid script injection.
          RAW_REF: ${{ github.event.inputs.upstream_ref }}
        run: |
          set -euo pipefail
          REF="${RAW_REF:-2026.7.2}"
          # Validate: a git ref cannot contain shell metacharacters or newlines.
          if [[ ! "$REF" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "::error::Invalid upstream ref: $REF"
            exit 1
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Download upstream component files
        env:
          UPSTREAM_REF: ${{ steps.ref.outputs.ref }}
          UPSTREAM_PATH: homeassistant/components/tesla_fleet
          LOCAL_PATH: custom_components/tesla_fleet
        run: |
          set -euo pipefail
          BASE_URL="https://raw.githubusercontent.com/home-assistant/core/${UPSTREAM_REF}/${UPSTREAM_PATH}"

          # Fetch the directory listing via the GitHub API.
          curl -sSf \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/home-assistant/core/contents/${UPSTREAM_PATH}?ref=${UPSTREAM_REF}" \
            > listing.json

          # Download every top-level file. The translations/ subdirectory is
          # intentionally excluded: HA core generates per-locale files from
          # strings.json at build time, whereas a custom component must ship a
          # resolved translations/en.json. apply_patches.py regenerates it.
          for name in $(jq -r '.[] | select(.type == "file") | .name' listing.json); do
            echo "  downloading ${name}"
            curl -sSf "${BASE_URL}/${name}" -o "${LOCAL_PATH}/${name}"
          done
          rm -f listing.json

      - name: Re-apply local customizations
        env:
          UPSTREAM_REF: ${{ steps.ref.outputs.ref }}
        run: python3 .github/scripts/apply_patches.py

      - name: Detect changes
        id: changes
        run: |
          # Use porcelain so newly-added upstream files (untracked) also count,
          # not just modifications to tracked files.
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get upstream commit SHA
        if: steps.changes.outputs.changed == 'true'
        id: upstream_sha
        env:
          UPSTREAM_REF: ${{ steps.ref.outputs.ref }}
        run: |
          set -euo pipefail
          SHA=$(curl -sSf \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/home-assistant/core/commits/${UPSTREAM_REF}" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'][:7])")
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "sync/ha-core-${{ steps.upstream_sha.outputs.sha }}"
          delete-branch: true
          commit-message: "Sync tesla_fleet from HA core (${{ steps.upstream_sha.outputs.sha }})"
          title: "Sync tesla_fleet from HA core (${{ steps.upstream_sha.outputs.sha }})"
          body: |
            Automated sync of `custom_components/tesla_fleet` from
            [home-assistant/core](https://github.com/home-assistant/core) `${{ steps.ref.outputs.ref }}` @ `${{ steps.upstream_sha.outputs.sha }}`.

            Local customizations (low power mode / keep accessory power switches,
            manifest version, resolved `translations/en.json`) were re-applied by
            `.github/scripts/apply_patches.py`.

            Please review the diff before merging.
          labels: "upstream-sync"
